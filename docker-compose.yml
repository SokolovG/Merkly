services:
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=base
    ports:
      - "8001:8000"
    volumes:
      - whisper-models:/root/.cache/huggingface
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 12
    #   start_period: 60s

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_started
      whisper:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./alembic/versions:/app/alembic/versions
    extra_hosts:
      # Allows bot to reach AnkiConnect running on host machine
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  whisper-models:
